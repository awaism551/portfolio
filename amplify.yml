version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            # Clean npm cache to avoid conflicts
            - npm cache clean --force
            # Remove node_modules and package-lock for fresh install
            - rm -rf node_modules package-lock.json
            # Install dependencies
            - npm ci
            # Verify Node and npm versions
            - node --version
            - npm --version
        build:
          commands:
            - env | grep REACT_APP_ >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
      customHeaders:
        - pattern: '**/*'
          headers:
            - key: 'Cache-Control'
              value: 'public, max-age=0, must-revalidate' 