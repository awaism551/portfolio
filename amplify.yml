version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            # Clean everything for fresh start
            - npm cache clean --force
            - rm -rf node_modules package-lock.json
            # Check versions for debugging
            - node --version
            - npm --version
            # Fresh install
            - npm install
            # Debug dependency versions
            - npm list zod || echo "Zod not found"
            - npm list typescript || echo "TypeScript not found"
            # Force specific zod version if needed
            - npm install zod@^3.22.4 --save
        build:
          commands:
            # Set TypeScript to skip lib check temporarily
            - export TS_NODE_SKIP_IGNORE=true
            - export NODE_OPTIONS="--max_old_space_size=4096"
            # Set environment variables
            - env | grep REACT_APP_ >> .env.production || true
            - env | grep NEXT_PUBLIC_ >> .env.production || true
            # Explicitly pass server-side environment variables
            - echo "OPENAI_API_KEY=$OPENAI_API_KEY" > .env.production
            - echo "LANGSMITH_TRACING=$LANGSMITH_TRACING" > .env.production
            - echo "LANGSMITH_ENDPOINT=$LANGSMITH_ENDPOINT" > .env.production
            - echo "LANGSMITH_API_KEY=$LANGSMITH_API_KEY" > .env.production
            - echo "LANGSMITH_PROJECT=$LANGSMITH_PROJECT" > .env.production
            - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
            - echo "PGSSLMODE=$PGSSLMODE" >> .env.production
            # Build with error handling
            - npm run build || (echo "Build failed, trying with skipLibCheck" && npm run build:skip-checks)
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
      customHeaders:
        - pattern: "**/*"
          headers:
            - key: "Cache-Control"
              value: "public, max-age=0, must-revalidate"
